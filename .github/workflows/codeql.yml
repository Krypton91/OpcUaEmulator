name: CodeQL

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '26 18 * * 4'

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  DEFAULT_DOTNET_VERSION: 10.0.x

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect .NET SDK source
        id: dotnet
        shell: bash
        run: |
          if [ -f "./global.json" ]; then
            echo "use_global_json=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_global_json=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET from global.json
        if: steps.dotnet.outputs.use_global_json == 'true'
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.props
            **/*.targets
            global.json

      - name: Setup .NET default SDK
        if: steps.dotnet.outputs.use_global_json != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DEFAULT_DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.props
            **/*.targets

      - name: Find solution file
        id: solution
        shell: bash
        run: |
          SOLUTION_FILE="$(find . -maxdepth 2 \( -name '*.slnx' -o -name '*.sln' \) | sort | head -n 1)"
          if [ -z "$SOLUTION_FILE" ]; then
            echo "No solution file (*.slnx or *.sln) found."
            exit 1
          fi
          echo "path=$SOLUTION_FILE" >> "$GITHUB_OUTPUT"
          echo "Using solution: $SOLUTION_FILE"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual
          queries: security-extended,security-and-quality

      - name: Restore for CodeQL
        shell: bash
        run: dotnet restore "${{ steps.solution.outputs.path }}"

      - name: Build for CodeQL
        shell: bash
        run: |
          dotnet build "${{ steps.solution.outputs.path }}" \
            --configuration "$CONFIGURATION" \
            --no-restore \
            /p:ContinuousIntegrationBuild=true

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
